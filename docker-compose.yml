services:
  api:
    build: .
    container_name: rentnearby_api
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION_STRING}
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: RentNearBy
      Jwt__Audience: RentNearBy
      Storage__UploadPath: /app/uploads
      Storage__BaseUrl: ${API_BASE_URL}
    volumes:
      - uploads:/app/uploads
    ports:
      - "5000:5000"

volumes:
  uploads:
